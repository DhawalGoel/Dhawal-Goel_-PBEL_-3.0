{% extends 'base.html' %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="text-gradient text-center mb-5">Get in Touch</h1>
            
            <div class="row mb-5">
                <div class="col-md-4 mb-4">
                    <div class="card stat-card">
                        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                        <h5>Email</h5>
                        <p class="text-muted">info@aistudent.com</p>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card stat-card">
                        <div class="stat-icon"><i class="fas fa-phone"></i></div>
                        <h5>Phone</h5>
                        <p class="text-muted">+1-800-PREDICT</p>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card stat-card">
                        <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <h5>Address</h5>
                        <p class="text-muted">Education Hub, Tech City</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-gradient">
                    <h5 class="mb-0">Send us a Message</h5>
                </div>
                <div class="card-body p-5">
                    <form method="POST">
                        <div class="form-group mb-4">
                            <label for="name" class="form-label">Your Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="form-group mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="form-group mb-4">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-paper-plane"></i> Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
