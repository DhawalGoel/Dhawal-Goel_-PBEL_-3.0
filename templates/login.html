{% extends 'base.html' %}

{% block title %}Login - AI Student Performance{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card glassmorphism border-0 shadow-gradient">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-brain fa-3x text-primary mb-3"></i>
                        <h2 class="text-gradient">AI Student Performance</h2>
                        <p class="text-muted">Sign in to your account</p>
                    </div>

                    <form method="POST">
                        <div class="form-group mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Enter your username" required autofocus>
                        </div>

                        <div class="form-group mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter your password" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>

                    <hr class="bg-secondary">

                    <p class="text-center text-muted mb-0">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">
                            Register here
                        </a>
                    </p>

                    <p class="text-center text-muted mt-3 mb-0 small">
                        <a href="{{ url_for('index') }}" class="text-decoration-none">
                            Back to Home
                        </a>
                    </p>
                </div>
            </div>

            <!-- Demo Credentials Info -->
            <div class="alert alert-info mt-4" role="alert">
                <strong><i class="fas fa-info-circle"></i> Demo Credentials:</strong><br>
                <small>Username: admin | Password: admin123</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
